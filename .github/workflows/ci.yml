name: CI

# Runs the unit tests (and a production build) on every push and pull request
# so regressions are caught before they reach the deployed site.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# One run per ref; cancel stale runs when new commits land.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate Annex C third-place table
        run: npm run validate:table

      - name: Build
        run: npm run build
